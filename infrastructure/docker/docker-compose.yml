version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medlab_user
      POSTGRES_PASSWORD: medlab_pass_secure
      POSTGRES_DB: medlab_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medlab_user -d medlab_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medlab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO File Storage ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: medlab-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: medlab-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: medlab_user
      DB_PASSWORD: medlab_pass_secure
      DB_DATABASE: medlab_pro
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-a-strong-secret}
      STORAGE_TYPE: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CORS_ORIGINS: https://admin.medlabpro.com,https://medlabpro.com
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads

  # ─── Lab Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: ../../apps/lab-dashboard
      dockerfile: Dockerfile
    container_name: medlab-dashboard
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
    ports:
      - "5173:80"
    depends_on:
      - api

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: medlab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
    depends_on:
      - api
      - dashboard

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_uploads:
  certbot_data: