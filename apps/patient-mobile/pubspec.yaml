name: medlab_patient
description: MedLab Pro - Patient Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  url_launcher: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  pdf_viewer: ^0.0.2
  path_provider: ^2.1.1
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/